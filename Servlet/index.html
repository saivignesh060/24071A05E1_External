<body>

<h2>Student Result Calculator</h2>

<form action="result" method="post">

    Roll Number:
    <input type="text" name="roll"><br><br>

    Student Name:
    <input type="text" name="name"><br><br>

    Subject 1 Name:
    <input type="text" name="s1"><br><br>

    Subject 1 Marks:
    <input type="number" name="m1"><br><br>

    Subject 2 Name:
    <input type="text" name="s2"><br><br>

    Subject 2 Marks:
    <input type="number" name="m2"><br><br>

    Subject 3 Name:
    <input type="text" name="s3"><br><br>

    Subject 3 Marks:
    <input type="number" name="m3"><br><br>

    <input type="submit" value="Calculate Result">

</form>
